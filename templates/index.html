<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wodex</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/katex/katex.min.css') }}">
  <script src="{{ url_for('static', filename='vendor/commonmark/commonmark.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/wodex_markdown.js') }}"></script>
  <script defer src="{{ url_for('static', filename='vendor/katex/katex.min.js') }}"></script>
  <script defer src="{{ url_for('static', filename='vendor/katex/contrib/auto-render.min.js') }}" onload="window.dispatchEvent(new Event('wodex:math-ready'))"></script>
  <style>
    @font-face {
      font-family: {{ ui_fonts.family | tojson }};
      src: url({{ url_for("font_asset", style="regular") | tojson }}) format("truetype");
      font-style: normal;
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: {{ ui_fonts.family | tojson }};
      src: url({{ url_for("font_asset", style="bold") | tojson }}) format("truetype");
      font-style: normal;
      font-weight: 700;
      font-display: swap;
    }

    @font-face {
      font-family: {{ ui_fonts.family | tojson }};
      src: url({{ url_for("font_asset", style="italic") | tojson }}) format("truetype");
      font-style: italic;
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: {{ ui_fonts.family | tojson }};
      src: url({{ url_for("font_asset", style="boldItalic") | tojson }}) format("truetype");
      font-style: italic;
      font-weight: 700;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: rgba(255, 252, 246, 0.92);
      --panel-strong: #fffaf1;
      --panel-soft: rgba(239, 232, 218, 0.76);
      --ink: #1f1b16;
      --muted: #6f6659;
      --line: rgba(31, 27, 22, 0.1);
      --accent: #c4532d;
      --accent-soft: rgba(196, 83, 45, 0.12);
      --accent-deep: #1b6256;
      --accent-deep-soft: rgba(27, 98, 86, 0.1);
      --chat-fg: {{ ui_colors.chatForeground }};
      --user-bg: {{ ui_colors.userBackground }};
      --assistant-bg-odd: {{ ui_colors.assistantOddBackground }};
      --assistant-bg-even: {{ ui_colors.assistantEvenBackground }};
      --shadow: 0 24px 60px rgba(31, 27, 22, 0.1);
      --mono: {{ ui_fonts.family | tojson }}, monospace;
      --font-size: {{ ui_fonts.sizePx }}px;
      --header-height: 128px;
      --sidebar-expanded-width: 316px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: var(--font-size);
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: var(--mono);
      font-synthesis: none;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(196, 83, 45, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(27, 98, 86, 0.16), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 40%),
        var(--bg);
    }

    .shell {
      width: 100vw;
      height: 100vh;
      margin: 0;
      display: grid;
      grid-template-columns: var(--sidebar-expanded-width) minmax(0, 1fr);
      background: rgba(255, 252, 246, 0.84);
      border: 0;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.96), rgba(239, 232, 218, 0.88));
    }

    .sidebar-top {
      flex: 0 0 auto;
      height: var(--header-height);
      padding: 18px 0 0;
      border-bottom: 0;
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.98), rgba(246, 239, 226, 0.95));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: visible;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: stretch;
      height: var(--header-height);
      padding: 18px 24px 0;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(244, 239, 230, 0.94));
    }

    .topbar-main {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      min-width: 0;
    }

    .thread-heading {
      min-width: 0;
      padding-bottom: 14px;
    }

    .sidebar-headline,
    .title-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .sidebar-headline {
      padding: 0 16px;
    }

    .brand-link {
      color: inherit;
      text-decoration: none;
    }

    .brand-link:hover {
      color: var(--accent);
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: clamp(1.8rem, 3vw, 2.35rem);
    }

    h2 {
      font-size: clamp(1.15rem, 2vw, 1.55rem);
    }

    .sessions-toggle {
      border: 0;
      border-radius: 0;
      padding: 8px 12px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    .sessions-toggle:hover {
      background: rgba(255, 255, 255, 0.48);
    }

    .meta,
    .hint,
    .status {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .meta {
      font-size: 0.96rem;
    }

    .hint {
      font-size: 0.9rem;
    }

    .status {
      flex: 0 0 auto;
      padding: 10px 24px 0;
      font-size: 0.95rem;
    }

    .sidebar-actions,
    .header-side {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .sidebar-actions {
      align-self: stretch;
      gap: 14px;
      padding: 8px 16px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.18);
    }

    .sidebar-actions > button {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    .sidebar-actions > button:hover {
      background: transparent;
      color: var(--accent);
    }

    .thread-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }

    .thread-list[hidden] {
      display: none;
    }

    .thread-empty,
    .chat-empty {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.45);
      color: var(--muted);
      line-height: 1.5;
    }

    .thread-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.54);
      padding: 10px 10px 9px;
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .thread-card:hover {
      transform: translateY(-1px);
      border-color: rgba(196, 83, 45, 0.25);
      background: rgba(255, 255, 255, 0.78);
    }

    .thread-card.active {
      border-color: rgba(196, 83, 45, 0.35);
      background: linear-gradient(180deg, rgba(196, 83, 45, 0.14), rgba(255, 255, 255, 0.92));
      box-shadow: inset 0 0 0 1px rgba(196, 83, 45, 0.08);
    }

    .thread-card-title {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-card-meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 2px;
      align-items: center;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
    }

    .thread-card-created {
      text-align: left;
      white-space: nowrap;
    }

    .thread-card-arrow {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .thread-card-updated {
      text-align: right;
      white-space: nowrap;
    }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
      font-family: var(--mono);
      color: var(--chat-fg);
    }

    .chat[hidden] {
      display: none;
    }

    .chat.chat-bottom::before {
      content: "";
      flex: 1 0 auto;
    }

    .message {
      width: 100%;
      max-width: 100%;
      padding: 14px 16px;
      border-radius: 0;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 1rem;
      align-self: flex-start;
      color: var(--chat-fg);
    }

    .message.user {
      background: var(--user-bg);
    }

    .message.assistant.assistant-odd {
      background: var(--assistant-bg-odd);
    }

    .message.assistant.assistant-even {
      background: var(--assistant-bg-even);
    }

    .message.plan {
      background: rgba(31, 27, 22, 0.06);
      color: var(--muted);
    }

    .message.reasoning {
      background: rgba(31, 27, 22, 0.09);
      color: var(--chat-fg);
    }

    .message.command {
      background: rgba(27, 98, 86, 0.12);
      color: var(--chat-fg);
    }

    .message.structured-item {
      background: rgba(31, 27, 22, 0.07);
      color: var(--chat-fg);
    }

    .message-markdown {
      line-height: 1.6;
      word-break: break-word;
      white-space: normal;
    }

    .message-markdown > *:first-child {
      margin-top: 0;
    }

    .message-markdown > *:last-child {
      margin-bottom: 0;
    }

    .message-markdown p {
      margin: 0 0 0.9em;
    }

    .message-markdown h1,
    .message-markdown h2,
    .message-markdown h3,
    .message-markdown h4,
    .message-markdown h5,
    .message-markdown h6 {
      margin: 1.1em 0 0.55em;
      line-height: 1.25;
    }

    .message-markdown h1 {
      font-size: 1.45rem;
    }

    .message-markdown h2 {
      font-size: 1.28rem;
    }

    .message-markdown h3 {
      font-size: 1.14rem;
    }

    .message-markdown ul,
    .message-markdown ol {
      margin: 0 0 0.9em;
      padding-left: 1.5em;
    }

    .message-markdown li + li {
      margin-top: 0.22em;
    }

    .message-markdown blockquote {
      margin: 0 0 0.9em;
      padding: 0.1em 0 0.1em 1em;
      border-left: 3px solid rgba(31, 27, 22, 0.2);
      color: var(--muted);
    }

    .message-markdown hr {
      margin: 1em 0;
      border: 0;
      border-top: 1px solid var(--line);
    }

    .message-markdown pre {
      margin: 0 0 0.9em;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.38);
      color: var(--chat-fg);
      white-space: pre-wrap;
      overflow-x: auto;
      font: inherit;
      line-height: 1.45;
    }

    .message-markdown code {
      padding: 0.08em 0.3em;
      border-radius: 4px;
      background: rgba(31, 27, 22, 0.08);
      font: inherit;
    }

    .message-markdown pre code {
      padding: 0;
      border-radius: 0;
      background: transparent;
    }

    .message-markdown a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.12em;
    }

    .message-markdown .katex {
      font-size: 1.04em;
    }

    .message-markdown .katex-display {
      margin: 0.9em 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.12em 0;
    }

    .message-markdown-math {
      margin: 0 0 0.9em;
    }

    .message-label {
      margin: 0 0 6px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(31, 27, 22, 0.68);
    }

    .message-title {
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .message-body {
      margin: 10px 0 0;
    }

    .message-body-code {
      margin: 10px 0 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.38);
      color: var(--chat-fg);
      white-space: pre-wrap;
      overflow-x: auto;
      font: inherit;
    }

    .message-command-line {
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-command-meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .message-command-output {
      margin: 10px 0 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.38);
      color: var(--chat-fg);
      white-space: pre-wrap;
      overflow-x: auto;
      font: inherit;
    }

    .message.thinking {
      color: var(--muted);
      font-style: italic;
    }

    .composer {
      flex: 0 0 auto;
      padding: 18px 24px 24px;
      border-top: 1px solid var(--line);
      background: rgba(255, 252, 246, 0.96);
    }

    .composer form {
      display: grid;
      gap: 12px;
    }

    textarea {
      width: 100%;
      min-height: 0;
      resize: none;
      overflow-y: hidden;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--chat-fg);
      font: inherit;
      line-height: 1.5;
    }

    textarea:focus {
      outline: 2px solid rgba(196, 83, 45, 0.24);
      border-color: rgba(196, 83, 45, 0.4);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-family: var(--mono);
      font-synthesis: none;
      cursor: pointer;
    }

    .icon-button {
      min-width: 1.2rem;
      padding-left: 0;
      padding-right: 0;
      text-align: center;
      font-size: 1.1rem;
      line-height: 1;
    }

    .shell.sessions-collapsed .chat,
    .shell.sessions-collapsed .composer,
    .shell.sessions-collapsed .status {
      margin-left: calc(-1 * var(--sidebar-expanded-width));
      width: calc(100% + var(--sidebar-expanded-width));
    }

    .shell.sessions-collapsed .sidebar {
      border-right: 0;
      background: transparent;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: var(--panel-soft);
      color: var(--ink);
    }

    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    code {
      font-size: 0.92em;
    }

    @media (max-width: 940px) {
      .shell {
        height: 100vh;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(240px, 38vh) minmax(0, 1fr);
        width: 100vw;
        margin: 0;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: none;
      }

      .topbar {
        height: auto;
        min-height: var(--header-height);
      }

      .topbar-main {
        align-items: stretch;
        flex-direction: column;
      }

      .shell.sessions-collapsed .chat,
      .shell.sessions-collapsed .composer,
      .shell.sessions-collapsed .status {
        margin-left: 0;
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .message {
        max-width: 100%;
      }

      .sidebar-actions {
        gap: 10px;
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-headline">
          <a class="brand-link" href="https://github.com/tomazos/wodex" target="_blank" rel="noreferrer">
            <h1>Wodex</h1>
          </a>
        </div>
        <div class="sidebar-actions">
          <button type="button" class="sessions-toggle" id="sessions-toggle" aria-expanded="true">▾ Sessions</button>
          <button type="button" class="secondary icon-button" id="new-thread-button" title="New chat" aria-label="New chat">+</button>
          <button type="button" class="ghost icon-button" id="refresh-threads-button" title="Refresh threads" aria-label="Refresh threads">↻</button>
        </div>
      </div>
      <div id="thread-list" class="thread-list" aria-label="Available threads"></div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-main">
          <div class="thread-heading">
            <div class="title-row">
              <h2 id="thread-title">Choose a thread</h2>
            </div>
            <p class="meta" id="thread-meta">No thread selected yet.</p>
          </div>
        </div>
      </header>

      <div id="status" class="status" hidden></div>
      <section id="chat" class="chat" aria-live="polite"></section>

      <section class="composer">
        <form id="chat-form">
          <textarea id="prompt" name="prompt" rows="1" placeholder="Ask Codex something..." aria-label="Prompt"></textarea>
        </form>
      </section>
    </section>
  </main>

  <script>
    const ACTIVE_THREAD_KEY = "wodex.activeThreadId";
    const SESSIONS_COLLAPSED_KEY = "wodex.sessionsCollapsed";
    const WINDOW_ID_KEY = "wodex.windowId";
    const MAX_ACTIVE_THREAD_TITLE_CHARS = 60;
    const WINDOW_HEARTBEAT_MS = {{ window_heartbeat_ms | tojson }};
    const DEFAULT_EMPTY_CHAT_MESSAGE = "Select a thread from the left, or start writing to create a new one.";
    const EMPTY_RENDERED_THREAD_MESSAGE = "This thread has no rendered messages yet.";
    const NEW_CHAT_TITLE = "New Chat";
    const NO_THREAD_YET_LABEL = "No thread yet.";

    const shellEl = document.querySelector(".shell");
    const workspaceEl = document.querySelector(".workspace");
    const topbarEl = document.querySelector(".topbar");
    const composerEl = document.querySelector(".composer");
    const sessionsToggleEl = document.getElementById("sessions-toggle");
    const threadListEl = document.getElementById("thread-list");
    const threadTitleEl = document.getElementById("thread-title");
    const threadMetaEl = document.getElementById("thread-meta");
    const chatEl = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const formEl = document.getElementById("chat-form");
    const promptEl = document.getElementById("prompt");
    const newThreadButtonEl = document.getElementById("new-thread-button");
    const refreshThreadsButtonEl = document.getElementById("refresh-threads-button");
    const markdownRenderer = window.WodexMarkdown.createRenderer({ commonmark: window.commonmark });

    let threads = [];
    let activeThreadId = sessionStorage.getItem(ACTIVE_THREAD_KEY) || null;
    let activeThread = null;
    let displayMessages = [];
    let activeTurnId = null;
    let thinkingSinceMs = null;
    let emptyChatMessage = DEFAULT_EMPTY_CHAT_MESSAGE;
    let isSubmitting = false;
    let heartbeatTimer = null;
    let thinkingTimer = null;
    let sessionsCollapsed = sessionStorage.getItem(SESSIONS_COLLAPSED_KEY) === "1";
    let windowId = sessionStorage.getItem(WINDOW_ID_KEY);
    let eventSource = null;
    let transcriptRenderQueued = false;
    let transcriptNodesByKey = new Map();
    let promptResizeQueued = false;
    let promptResizeNeedsLayout = false;
    let promptMetrics = null;
    let promptHeightPx = null;
    const ignoredClientMessageIds = new Set();

    if (!windowId) {
      windowId = self.crypto && self.crypto.randomUUID
        ? self.crypto.randomUUID()
        : `wodex-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      sessionStorage.setItem(WINDOW_ID_KEY, windowId);
    }

    function createClientMessageId() {
      return self.crypto && self.crypto.randomUUID
        ? self.crypto.randomUUID()
        : `msg-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.hidden = !text;
      statusEl.style.color = isError ? "var(--accent)" : "var(--muted)";
      schedulePromptResize({ forceLayoutUpdate: true });
    }

    function setBusy(nextBusy) {
      isSubmitting = nextBusy;
      newThreadButtonEl.disabled = nextBusy;
      refreshThreadsButtonEl.disabled = nextBusy;
      promptEl.disabled = nextBusy;
    }

    function setActiveThreadId(threadId) {
      activeThreadId = threadId || null;
      if (activeThreadId) {
        sessionStorage.setItem(ACTIVE_THREAD_KEY, activeThreadId);
      } else {
        sessionStorage.removeItem(ACTIVE_THREAD_KEY);
      }
    }

    function setSessionsCollapsed(nextCollapsed) {
      sessionsCollapsed = Boolean(nextCollapsed);
      sessionStorage.setItem(SESSIONS_COLLAPSED_KEY, sessionsCollapsed ? "1" : "0");
      shellEl.classList.toggle("sessions-collapsed", sessionsCollapsed);
      threadListEl.hidden = sessionsCollapsed;
      sessionsToggleEl.textContent = `${sessionsCollapsed ? "▸" : "▾"} Sessions`;
      sessionsToggleEl.setAttribute("aria-expanded", String(!sessionsCollapsed));
    }

    async function postWindowPresence(path) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ windowId }),
        keepalive: true,
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Window presence failed with ${response.status}`);
      }
      return payload;
    }

    function beaconWindowClose() {
      const body = JSON.stringify({ windowId });
      if (!navigator.sendBeacon) {
        fetch("/api/window/close", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
          keepalive: true,
        }).catch(() => {});
        return;
      }
      navigator.sendBeacon(
        "/api/window/close",
        new Blob([body], { type: "application/json" }),
      );
    }

    async function registerWindow() {
      await postWindowPresence("/api/window/open");
      if (heartbeatTimer !== null) {
        clearInterval(heartbeatTimer);
      }
      heartbeatTimer = window.setInterval(() => {
        postWindowPresence("/api/window/heartbeat").catch(() => {});
      }, WINDOW_HEARTBEAT_MS);
    }

    function formatTimestamp(timestampSeconds) {
      if (!timestampSeconds) {
        return "Unknown time";
      }
      const date = new Date(timestampSeconds * 1000);
      const parts = [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, "0"),
        String(date.getDate()).padStart(2, "0"),
      ];
      const time = [
        String(date.getHours()).padStart(2, "0"),
        String(date.getMinutes()).padStart(2, "0"),
      ];
      return `${parts.join("-")} ${time.join(":")}`;
    }

    function formatElapsedDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${hours}h${String(minutes).padStart(2, "0")}m${String(seconds).padStart(2, "0")}s`;
      }
      if (minutes > 0) {
        return `${minutes}m${String(seconds).padStart(2, "0")}s`;
      }
      return `${seconds}s`;
    }

    function formatCommandDuration(durationMs) {
      const value = Number(durationMs);
      if (!Number.isFinite(value) || value < 0) {
        return null;
      }
      if (value < 1000) {
        return `${Math.round(value)}ms`;
      }
      return formatElapsedDuration(value);
    }

    function formatThinkingLabel() {
      if (thinkingSinceMs === null) {
        return "Thinking...";
      }
      return `Thinking... ${formatElapsedDuration(Date.now() - thinkingSinceMs)}`;
    }

    function truncateTitle(text, maxLength = MAX_ACTIVE_THREAD_TITLE_CHARS) {
      const value = String(text || "");
      if (value.length <= maxLength) {
        return value;
      }
      return `${value.slice(0, maxLength)}...`;
    }

    function isMarkdownBlank(text) {
      return !String(text || "").trim();
    }

    function renderMathInNode(element) {
      markdownRenderer.renderMathInNode(element);
    }

    function renderMarkdown(text) {
      return markdownRenderer.renderMessageHtml(text);
    }

    function normalizeMessage(message, { completed = true } = {}) {
      return {
        role: message.role,
        text: String(message.text || ""),
        completed: Boolean(message.completed ?? completed),
        itemId: message.itemId || null,
        label: String(message.label || ""),
        title: String(message.title || ""),
        metaParts: Array.isArray(message.metaParts) ? message.metaParts.map((part) => String(part)) : [],
        bodyIsCode: Boolean(message.bodyIsCode),
        command: String(message.command || ""),
        cwd: String(message.cwd || ""),
        status: message.status || null,
        exitCode: message.exitCode ?? null,
        durationMs: message.durationMs ?? null,
        processId: message.processId || null,
        terminalInputCount: Number(message.terminalInputCount || 0),
      };
    }

    function normalizeMessages(messages) {
      return (messages || []).map((message) => normalizeMessage(message));
    }

    function shouldRenderMessage(message) {
      if (!message) {
        return false;
      }
      if (message.role === "command") {
        return Boolean(message.command || message.text || message.status);
      }
      if (message.label) {
        return Boolean(message.label || message.title || message.text || message.metaParts?.length);
      }
      return Boolean(message.text);
    }

    function messageMatchesAnchor(message, anchor) {
      if (!anchor || !message || message.role !== anchor.role) {
        return false;
      }
      if (message.role === "command") {
        return (
          (message.command || "") === (anchor.command || "") &&
          (message.text || "") === (anchor.text || "") &&
          (message.cwd || "") === (anchor.cwd || "") &&
          (message.status || null) === (anchor.status || null)
        );
      }
      if (message.label || anchor.label) {
        return (
          (message.label || "") === (anchor.label || "") &&
          (message.title || "") === (anchor.title || "") &&
          (message.text || "") === (anchor.text || "")
        );
      }
      return (message.text || "") === (anchor.text || "");
    }

    function captureMessageAnchor(message) {
      if (!message) {
        return null;
      }
      return {
        role: message.role,
        text: message.text || "",
        label: message.label || "",
        title: message.title || "",
        command: message.command || "",
        cwd: message.cwd || "",
        status: message.status || null,
      };
    }

    function isEphemeralTranscriptItem(message) {
      return Boolean(message?.itemId && message?.role !== "assistant" && message?.role !== "user");
    }

    function messagesEquivalent(left, right) {
      return messageMatchesAnchor(left, captureMessageAnchor(right));
    }

    function captureEphemeralItems(messages) {
      const capturedItems = [];
      for (let index = 0; index < messages.length; index += 1) {
        const message = messages[index];
        if (!isEphemeralTranscriptItem(message) || !message.itemId || !shouldRenderMessage(message)) {
          continue;
        }

        let previousAnchor = null;
        for (let cursor = index - 1; cursor >= 0; cursor -= 1) {
          const candidate = messages[cursor];
          if (!shouldRenderMessage(candidate) || isEphemeralTranscriptItem(candidate)) {
            continue;
          }
          previousAnchor = captureMessageAnchor(candidate);
          break;
        }

        let nextAnchor = null;
        for (let cursor = index + 1; cursor < messages.length; cursor += 1) {
          const candidate = messages[cursor];
          if (!shouldRenderMessage(candidate) || isEphemeralTranscriptItem(candidate)) {
            continue;
          }
          nextAnchor = captureMessageAnchor(candidate);
          break;
        }

        capturedItems.push({
          ...normalizeMessage(message, { completed: true }),
          previousAnchor,
          nextAnchor,
        });
      }
      return capturedItems;
    }

    function mergeEphemeralItems(messages, capturedItems) {
      const mergedMessages = [...messages];
      for (const item of capturedItems) {
        if (mergedMessages.some((message) => messagesEquivalent(message, item))) {
          continue;
        }

        let insertIndex = mergedMessages.length;
        if (item.nextAnchor) {
          const nextIndex = mergedMessages.findIndex((message) => messageMatchesAnchor(message, item.nextAnchor));
          if (nextIndex >= 0) {
            insertIndex = nextIndex;
          }
        } else if (item.previousAnchor) {
          const previousIndex = mergedMessages.findLastIndex((message) => messageMatchesAnchor(message, item.previousAnchor));
          if (previousIndex >= 0) {
            insertIndex = previousIndex + 1;
          }
        }

        mergedMessages.splice(insertIndex, 0, {
          ...normalizeMessage(item, { completed: true }),
        });
      }
      return mergedMessages;
    }

    function resetThinkingState() {
      activeTurnId = null;
      thinkingSinceMs = null;
      if (thinkingTimer !== null) {
        clearInterval(thinkingTimer);
        thinkingTimer = null;
      }
    }

    function updateThinkingIndicator() {
      const indicator = document.getElementById("thinking-indicator");
      if (indicator !== null) {
        indicator.textContent = formatThinkingLabel();
      }
    }

    function syncThinkingTimer() {
      if (thinkingTimer !== null) {
        clearInterval(thinkingTimer);
        thinkingTimer = null;
      }
      if (!activeTurnId) {
        return;
      }
      updateThinkingIndicator();
      thinkingTimer = window.setInterval(updateThinkingIndicator, 1000);
    }

    function refreshPromptMetrics() {
      const promptStyle = window.getComputedStyle(promptEl);
      const composerStyle = window.getComputedStyle(composerEl);
      promptMetrics = {
        lineHeight: parseFloat(promptStyle.lineHeight) || 24,
        promptVerticalChrome:
          parseFloat(promptStyle.paddingTop) +
          parseFloat(promptStyle.paddingBottom) +
          parseFloat(promptStyle.borderTopWidth) +
          parseFloat(promptStyle.borderBottomWidth),
        composerVerticalChrome:
          parseFloat(composerStyle.paddingTop) +
          parseFloat(composerStyle.paddingBottom) +
          parseFloat(composerStyle.borderTopWidth),
      };
    }

    function resizePrompt({ forceLayoutUpdate = false } = {}) {
      if (!promptMetrics) {
        refreshPromptMetrics();
      }

      const { lineHeight, promptVerticalChrome, composerVerticalChrome } = promptMetrics;
      const minPromptHeight = lineHeight + promptVerticalChrome;
      const totalConversationHeight =
        workspaceEl.clientHeight -
        topbarEl.offsetHeight -
        (statusEl.hidden ? 0 : statusEl.offsetHeight);
      const maxComposerHeight = Math.max(minPromptHeight + composerVerticalChrome, totalConversationHeight / 2);
      const maxPromptHeight = Math.max(minPromptHeight, maxComposerHeight - composerVerticalChrome);
      const previousHeight = promptHeightPx;
      const previousOverflowY = promptEl.style.overflowY;

      promptEl.style.height = "auto";
      const nextHeight = Math.min(promptEl.scrollHeight, maxPromptHeight);
      const appliedHeight = Math.max(minPromptHeight, nextHeight);
      const nextOverflowY = promptEl.scrollHeight > maxPromptHeight ? "auto" : "hidden";

      promptEl.style.height = `${appliedHeight}px`;
      promptEl.style.overflowY = nextOverflowY;
      promptHeightPx = appliedHeight;

      const heightChanged = previousHeight === null || Math.abs(previousHeight - appliedHeight) > 0.5;
      const overflowChanged = previousOverflowY !== nextOverflowY;
      if (forceLayoutUpdate || heightChanged || overflowChanged) {
        updateChatLayout();
      }
    }

    function schedulePromptResize({ forceLayoutUpdate = false } = {}) {
      promptResizeNeedsLayout = promptResizeNeedsLayout || forceLayoutUpdate;
      if (promptResizeQueued) {
        return;
      }
      promptResizeQueued = true;
      window.requestAnimationFrame(() => {
        promptResizeQueued = false;
        const shouldUpdateLayout = promptResizeNeedsLayout;
        promptResizeNeedsLayout = false;
        resizePrompt({ forceLayoutUpdate: shouldUpdateLayout });
      });
    }

    function updateChatLayout() {
      if (chatEl.hidden) {
        return;
      }
      const firstChild = chatEl.firstElementChild;
      const hasMessages = Boolean(firstChild) && !firstChild.classList.contains("chat-empty");
      const shouldBottomAlign = hasMessages && chatEl.scrollHeight <= chatEl.clientHeight + 1;
      chatEl.classList.toggle("chat-bottom", shouldBottomAlign);
    }

    function clearMainPane(message) {
      activeThread = null;
      displayMessages = [];
      emptyChatMessage = message || DEFAULT_EMPTY_CHAT_MESSAGE;
      resetThinkingState();
      threadTitleEl.textContent = NEW_CHAT_TITLE;
      threadTitleEl.title = NEW_CHAT_TITLE;
      threadMetaEl.textContent = NO_THREAD_YET_LABEL;
      renderActivePane();
    }

    function appendUserMessage(text, clientMessageId = null, afterCompletedOnly = false) {
      const nextMessage = {
        role: "user",
        text,
        clientMessageId,
        completed: true,
      };

      if (!afterCompletedOnly) {
        displayMessages.push(nextMessage);
        return;
      }

      const firstIncompleteIndex = displayMessages.findIndex((message) => message.completed === false);
      if (firstIncompleteIndex === -1) {
        displayMessages.push(nextMessage);
        return;
      }

      displayMessages.splice(firstIncompleteIndex, 0, nextMessage);
    }

    function removeUserMessage(clientMessageId) {
      displayMessages = displayMessages.filter((message) => message.clientMessageId !== clientMessageId);
    }

    function upsertLiveMessage(itemId, role, text, { completed = false } = {}) {
      const nextText = String(text || "");
      const existingIndex = displayMessages.findIndex((message) => message.itemId === itemId);
      if (existingIndex >= 0) {
        displayMessages[existingIndex].role = role;
        displayMessages[existingIndex].text = nextText;
        displayMessages[existingIndex].completed = completed;
        return;
      }
      if (!nextText) {
        return;
      }
      displayMessages.push({
        role,
        text: nextText,
        itemId,
        completed,
      });
    }

    function replaceLiveItems(items) {
      displayMessages = displayMessages.filter((message) => !message.itemId);
      for (const message of items || []) {
        const normalized = normalizeMessage(message, { completed: Boolean(message.completed) });
        if (!shouldRenderMessage(normalized)) {
          continue;
        }
        displayMessages.push(normalized);
      }
    }

    function syncLiveState(live) {
      const nextLive = live || {};
      activeTurnId = nextLive.activeTurnId || null;
      thinkingSinceMs = nextLive.thinkingSince ? nextLive.thinkingSince * 1000 : null;
      replaceLiveItems(nextLive.items || []);
      syncThinkingTimer();
    }

    function buildRenderMessages() {
      const renderMessages = [...displayMessages];
      if (activeTurnId) {
        renderMessages.push({
          role: "assistant",
          text: formatThinkingLabel(),
          isThinking: true,
        });
      }
      return renderMessages;
    }

    function messageKey(message, index) {
      if (message.isThinking) {
        return "__thinking__";
      }
      if (message.itemId) {
        return `item:${message.itemId}`;
      }
      if (message.clientMessageId) {
        return `client:${message.clientMessageId}`;
      }
      return `static:${index}:${message.role}`;
    }

    function messageFingerprint(message, assistantVariant) {
      return JSON.stringify({
        role: message.role,
        text: message.text || "",
        completed: Boolean(message.completed),
        isThinking: Boolean(message.isThinking),
        label: message.label || "",
        title: message.title || "",
        metaParts: message.metaParts || [],
        bodyIsCode: Boolean(message.bodyIsCode),
        command: message.command || "",
        cwd: message.cwd || "",
        status: message.status || null,
        exitCode: message.exitCode ?? null,
        durationMs: message.durationMs ?? null,
        processId: message.processId || null,
        terminalInputCount: Number(message.terminalInputCount || 0),
        assistantVariant,
      });
    }

    function renderMessageNode(article, message, assistantVariant) {
      article.className = "message";
      article.removeAttribute("id");
      article.classList.add(message.role);
      if (message.role === "assistant" && assistantVariant) {
        article.classList.add(assistantVariant);
      }

      article.replaceChildren();

      if (message.isThinking) {
        article.classList.add("thinking");
        article.id = "thinking-indicator";
        article.textContent = formatThinkingLabel();
        return;
      }

      if (message.role === "command") {
        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = "Command";

        const commandLine = document.createElement("div");
        commandLine.className = "message-command-line";
        commandLine.textContent = message.command || "(command unavailable)";

        article.append(label, commandLine);

        const metaParts = [];
        if (message.cwd) {
          metaParts.push(message.cwd);
        }
        if (message.status) {
          metaParts.push(message.status);
        }
        if (message.exitCode !== null && message.exitCode !== undefined) {
          metaParts.push(`exit ${message.exitCode}`);
        }
        const durationLabel = formatCommandDuration(message.durationMs);
        if (durationLabel) {
          metaParts.push(durationLabel);
        }
        if (message.terminalInputCount > 0) {
          metaParts.push(`stdin x${message.terminalInputCount}`);
        }

        if (metaParts.length) {
          const meta = document.createElement("div");
          meta.className = "message-command-meta";
          meta.textContent = metaParts.join(" | ");
          article.appendChild(meta);
        }

        if (message.text) {
          const output = document.createElement("pre");
          output.className = "message-command-output";
          output.textContent = message.text;
          article.appendChild(output);
        }
        return;
      }

      if (message.label) {
        article.classList.add("structured-item");

        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = message.label;
        article.appendChild(label);

        if (message.title) {
          const title = document.createElement("div");
          title.className = "message-title";
          title.textContent = message.title;
          article.appendChild(title);
        }

        if (message.metaParts && message.metaParts.length) {
          const meta = document.createElement("div");
          meta.className = "message-meta";
          meta.textContent = message.metaParts.join(" | ");
          article.appendChild(meta);
        }

        if (message.text) {
          const body = document.createElement(message.bodyIsCode ? "pre" : "div");
          body.className = message.bodyIsCode ? "message-body-code" : "message-body";
          body.textContent = message.text;
          article.appendChild(body);
        }
        return;
      }

      if (message.role === "plan" || message.role === "reasoning") {
        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = message.role === "plan" ? "Plan" : "Reasoning";
        const body = document.createElement("div");
        if (message.role === "reasoning") {
          body.className = "message-markdown";
          body.innerHTML = isMarkdownBlank(message.text) ? "" : renderMarkdown(message.text);
          renderMathInNode(body);
        } else {
          body.textContent = message.text;
        }
        article.append(label, body);
        return;
      }

      if (message.role === "assistant" || message.role === "user") {
        const body = document.createElement("div");
        body.className = "message-markdown";
        body.innerHTML = isMarkdownBlank(message.text) ? "" : renderMarkdown(message.text);
        renderMathInNode(body);
        article.appendChild(body);
        return;
      }

      article.textContent = message.text;
    }

    function renderTranscript() {
      const renderMessages = buildRenderMessages();
      const shouldStickToBottom =
        Boolean(activeTurnId) ||
        chatEl.scrollTop + chatEl.clientHeight >= chatEl.scrollHeight - 32;

      if (!renderMessages.length) {
        transcriptNodesByKey = new Map();
        chatEl.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "chat-empty";
        empty.textContent = emptyChatMessage;
        chatEl.appendChild(empty);
        updateChatLayout();
        return;
      }

      const emptyNode = chatEl.querySelector(".chat-empty");
      if (emptyNode) {
        emptyNode.remove();
      }

      const nextNodesByKey = new Map();
      let assistantCount = 0;
      let previousNode = null;

      renderMessages.forEach((message, index) => {
        const key = messageKey(message, index);
        const article = transcriptNodesByKey.get(key) || document.createElement("article");
        const assistantVariant = message.role === "assistant"
          ? ((assistantCount += 1) % 2 === 0 ? "assistant-even" : "assistant-odd")
          : "";
        const fingerprint = messageFingerprint(message, assistantVariant);

        if (article.dataset.fingerprint !== fingerprint) {
          renderMessageNode(article, message, assistantVariant);
          article.dataset.fingerprint = fingerprint;
        }

        nextNodesByKey.set(key, article);

        if (previousNode === null) {
          if (chatEl.firstChild !== article) {
            chatEl.insertBefore(article, chatEl.firstChild);
          }
        } else if (article.previousSibling !== previousNode) {
          chatEl.insertBefore(article, previousNode.nextSibling);
        }
        previousNode = article;
      });

      for (const [key, node] of transcriptNodesByKey.entries()) {
        if (!nextNodesByKey.has(key)) {
          node.remove();
        }
      }

      transcriptNodesByKey = nextNodesByKey;
      updateChatLayout();
      if (shouldStickToBottom) {
        chatEl.scrollTop = chatEl.scrollHeight;
      }
      updateThinkingIndicator();
    }

    function renderActivePane() {
      renderTranscript();
    }

    function scheduleTranscriptRender() {
      if (transcriptRenderQueued) {
        return;
      }
      transcriptRenderQueued = true;
      window.requestAnimationFrame(() => {
        transcriptRenderQueued = false;
        renderTranscript();
      });
    }

    function renderThreadList() {
      threadListEl.innerHTML = "";

      if (!threads.length) {
        const empty = document.createElement("div");
        empty.className = "thread-empty";
        empty.textContent = "No stored threads were found yet.";
        threadListEl.appendChild(empty);
        return;
      }

      for (const thread of threads) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `thread-card${thread.id === activeThreadId ? " active" : ""}`;
        button.dataset.threadId = thread.id;

        const title = document.createElement("p");
        title.className = "thread-card-title";
        title.textContent = thread.title;
        title.title = thread.title;
        button.appendChild(title);

        const meta = document.createElement("div");
        meta.className = "thread-card-meta";

        const created = document.createElement("span");
        created.className = "thread-card-created";
        created.textContent = formatTimestamp(thread.createdAt);
        meta.appendChild(created);

        const arrow = document.createElement("span");
        arrow.className = "thread-card-arrow";
        arrow.textContent = "↔";
        meta.appendChild(arrow);

        const updated = document.createElement("span");
        updated.className = "thread-card-updated";
        updated.textContent = formatTimestamp(thread.updatedAt);
        meta.appendChild(updated);

        button.appendChild(meta);
        threadListEl.appendChild(button);
      }
    }

    function renderActiveThread() {
      if (!activeThread) {
        threadTitleEl.textContent = NEW_CHAT_TITLE;
        threadTitleEl.title = NEW_CHAT_TITLE;
        threadMetaEl.textContent = activeThreadId || NO_THREAD_YET_LABEL;
        renderActivePane();
        return;
      }

      threadTitleEl.textContent = truncateTitle(activeThread.title);
      threadTitleEl.title = activeThread.title;
      threadMetaEl.textContent = activeThread.id || "No session id";
      renderActivePane();
    }

    async function fetchThreads() {
      const response = await fetch("/api/threads");
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Thread list failed with ${response.status}`);
      }
      return payload;
    }

    async function fetchThread(threadId) {
      const response = await fetch(`/api/threads/${encodeURIComponent(threadId)}`);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Thread read failed with ${response.status}`);
      }
      return payload;
    }

    async function sendMessage(message, clientMessageId) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message,
          threadId: activeThreadId,
          clientMessageId,
        }),
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Chat failed with ${response.status}`);
      }
      return payload;
    }

    async function refreshThreadList({ selectDefault = false } = {}) {
      const payload = await fetchThreads();
      threads = payload.threads || [];

      if (activeThreadId && !threads.some((thread) => thread.id === activeThreadId)) {
        setActiveThreadId(null);
      }

      if (!activeThreadId && selectDefault && threads.length) {
        setActiveThreadId(threads[0].id);
      }

      renderThreadList();
    }

    async function selectThread(threadId) {
      if (!threadId) {
        setActiveThreadId(null);
        clearMainPane();
        renderThreadList();
        return;
      }

      setStatus("Loading thread...");
      const payload = await fetchThread(threadId);
      setActiveThreadId(threadId);
      activeThread = payload.thread;
      displayMessages = normalizeMessages(payload.messages);
      emptyChatMessage = EMPTY_RENDERED_THREAD_MESSAGE;
      syncLiveState(payload.live);
      renderThreadList();
      renderActiveThread();
      setStatus("");
    }

    function startDraft() {
      setActiveThreadId(null);
      clearMainPane("Fresh draft. Sending a message here will create a new Codex thread.");
      renderThreadList();
      promptEl.focus();
      schedulePromptResize({ forceLayoutUpdate: true });
      setStatus("");
    }

    async function handleTurnCompleted(eventPayload) {
      if (eventPayload.threadId !== activeThreadId) {
        await refreshThreadList().catch(() => {});
        return;
      }

      const ephemeralItems = captureEphemeralItems(displayMessages);
      resetThinkingState();
      await refreshThreadList().catch(() => {});
      try {
        const payload = await fetchThread(eventPayload.threadId);
        activeThread = payload.thread;
        displayMessages = mergeEphemeralItems(normalizeMessages(payload.messages), ephemeralItems);
        emptyChatMessage = EMPTY_RENDERED_THREAD_MESSAGE;
        syncLiveState(payload.live);
        renderThreadList();
        renderActiveThread();
        if (eventPayload.status && eventPayload.status !== "completed") {
          setStatus(`Turn ended with status: ${eventPayload.status}.`, true);
        } else {
          setStatus("");
        }
      } catch (error) {
        setStatus(error.message || "Failed to refresh thread after completion.", true);
      }
    }

    async function handleServerEvent(eventPayload) {
      const threadId = eventPayload.threadId || null;

      if (threadId && threadId !== activeThreadId) {
        if (eventPayload.kind === "user_message" || eventPayload.kind === "turn_completed") {
          refreshThreadList().catch(() => {});
        }
        return;
      }

      switch (eventPayload.kind) {
        case "user_message":
          if (eventPayload.clientMessageId && ignoredClientMessageIds.has(eventPayload.clientMessageId)) {
            ignoredClientMessageIds.delete(eventPayload.clientMessageId);
            return;
          }
          if (eventPayload.text) {
            appendUserMessage(eventPayload.text, null, Boolean(activeTurnId));
            scheduleTranscriptRender();
          }
          break;

        case "turn_started":
          activeTurnId = eventPayload.turnId || eventPayload.live?.activeTurnId || activeTurnId;
          if (eventPayload.live?.thinkingSince) {
            thinkingSinceMs = eventPayload.live.thinkingSince * 1000;
          }
          syncThinkingTimer();
          scheduleTranscriptRender();
          break;

        case "agent_message_started":
          if (eventPayload.live?.activeTurnId) {
            activeTurnId = eventPayload.live.activeTurnId;
          }
          if (eventPayload.resetThinkingTimer && eventPayload.live?.thinkingSince) {
            thinkingSinceMs = eventPayload.live.thinkingSince * 1000;
          }
          if (eventPayload.text) {
            upsertLiveMessage(eventPayload.itemId, "assistant", eventPayload.text, { completed: false });
          }
          syncThinkingTimer();
          scheduleTranscriptRender();
          break;

        case "agent_message_delta":
          if (eventPayload.live?.activeTurnId) {
            activeTurnId = eventPayload.live.activeTurnId;
          }
          if (eventPayload.resetThinkingTimer && eventPayload.live?.thinkingSince) {
            thinkingSinceMs = eventPayload.live.thinkingSince * 1000;
          }
          upsertLiveMessage(
            eventPayload.itemId,
            "assistant",
            eventPayload.text || eventPayload.delta || "",
            { completed: false },
          );
          syncThinkingTimer();
          scheduleTranscriptRender();
          break;

        case "agent_message_completed":
          upsertLiveMessage(eventPayload.itemId, "assistant", eventPayload.text || "", { completed: true });
          scheduleTranscriptRender();
          break;

        case "plan_started":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "plan_delta":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "plan_completed":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "turn_plan_updated":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "reasoning_started":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "reasoning_updated":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "reasoning_completed":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "command_execution_started":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "command_execution_updated":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "command_execution_completed":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "structured_item_started":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "structured_item_updated":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "structured_item_completed":
          syncLiveState(eventPayload.live);
          scheduleTranscriptRender();
          break;

        case "turn_error":
          if (!eventPayload.willRetry) {
            setStatus(eventPayload.message || "Codex reported an error.", true);
          }
          break;

        case "turn_completed":
          await handleTurnCompleted(eventPayload);
          break;

        default:
          break;
      }
    }

    function connectEventStream() {
      if (eventSource !== null) {
        eventSource.close();
      }
      eventSource = new EventSource("/api/events");
      eventSource.onmessage = (event) => {
        if (!event.data) {
          return;
        }
        try {
          const payload = JSON.parse(event.data);
          handleServerEvent(payload).catch((error) => {
            setStatus(error.message || "Failed to handle a live update.", true);
          });
        } catch (error) {
          setStatus(error.message || "Failed to parse a live update.", true);
        }
      };
    }

    async function initialize() {
      setSessionsCollapsed(sessionsCollapsed);
      connectEventStream();
      await registerWindow();
      setStatus("Loading threads...");
      await refreshThreadList({ selectDefault: true });

      if (activeThreadId) {
        try {
          await selectThread(activeThreadId);
        } catch (error) {
          setActiveThreadId(null);
          clearMainPane("The previously selected thread could not be loaded.");
          renderThreadList();
          setStatus(error.message || "Failed to load thread.", true);
          return;
        }
      } else {
        clearMainPane();
      }

      refreshPromptMetrics();
      schedulePromptResize({ forceLayoutUpdate: true });
      setStatus("");
    }

    threadListEl.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-thread-id]");
      if (!button || isSubmitting) {
        return;
      }

      try {
        await selectThread(button.dataset.threadId);
      } catch (error) {
        setStatus(error.message || "Failed to load thread.", true);
      }
    });

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (isSubmitting) {
        return;
      }

      const message = promptEl.value.trim();
      if (!message) {
        setStatus("Enter a prompt first.", true);
        return;
      }

      const hadActiveTurn = Boolean(activeTurnId);
      const clientMessageId = createClientMessageId();
      ignoredClientMessageIds.add(clientMessageId);

      promptEl.value = "";
      schedulePromptResize();
      appendUserMessage(message, clientMessageId, hadActiveTurn);
      if (!hadActiveTurn) {
        thinkingSinceMs = Date.now();
      }
      renderActiveThread();
      syncThinkingTimer();
      setStatus("");

      setBusy(true);
      try {
        const payload = await sendMessage(message, clientMessageId);
        setActiveThreadId(payload.threadId);
        if (!activeThread || activeThread.id !== payload.threadId) {
          activeThread = {
            id: payload.threadId,
            title: activeThread?.title || NEW_CHAT_TITLE,
          };
        }
        emptyChatMessage = EMPTY_RENDERED_THREAD_MESSAGE;
        if (payload.mode === "start") {
          syncLiveState(payload.live);
        } else {
          activeTurnId = payload.live?.activeTurnId || payload.turnId || activeTurnId;
          if (payload.live?.thinkingSince) {
            thinkingSinceMs = payload.live.thinkingSince * 1000;
          }
          syncThinkingTimer();
        }
        await refreshThreadList();
        renderActiveThread();
      } catch (error) {
        ignoredClientMessageIds.delete(clientMessageId);
        removeUserMessage(clientMessageId);
        if (!hadActiveTurn) {
          resetThinkingState();
        } else {
          syncThinkingTimer();
        }
        promptEl.value = message;
        schedulePromptResize();
        renderActiveThread();
        setStatus(error.message || "Request failed.", true);
      } finally {
        setBusy(false);
        promptEl.focus();
      }
    });

    promptEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" || event.shiftKey || event.isComposing) {
        return;
      }
      event.preventDefault();
      if (!isSubmitting) {
        formEl.requestSubmit();
      }
    });

    promptEl.addEventListener("input", () => {
      schedulePromptResize();
    });

    sessionsToggleEl.addEventListener("click", () => {
      setSessionsCollapsed(!sessionsCollapsed);
    });

    newThreadButtonEl.addEventListener("click", () => {
      if (isSubmitting) {
        return;
      }
      startDraft();
    });

    refreshThreadsButtonEl.addEventListener("click", async () => {
      if (isSubmitting) {
        return;
      }

      setBusy(true);
      setStatus("Refreshing threads...");
      try {
        await refreshThreadList();
        if (activeThreadId) {
          await selectThread(activeThreadId);
        } else {
          clearMainPane();
          setStatus("");
        }
      } catch (error) {
        setStatus(error.message || "Refresh failed.", true);
      } finally {
        setBusy(false);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        postWindowPresence("/api/window/heartbeat").catch(() => {});
      }
    });

    window.addEventListener("pagehide", () => {
      if (heartbeatTimer !== null) {
        clearInterval(heartbeatTimer);
      }
      if (thinkingTimer !== null) {
        clearInterval(thinkingTimer);
      }
      if (eventSource !== null) {
        eventSource.close();
      }
      beaconWindowClose();
    });

    window.addEventListener("resize", () => {
      refreshPromptMetrics();
      schedulePromptResize({ forceLayoutUpdate: true });
    });

    window.addEventListener("wodex:math-ready", () => {
      renderActivePane();
    });

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        refreshPromptMetrics();
        schedulePromptResize({ forceLayoutUpdate: true });
      }).catch(() => {});
    }

    initialize().catch((error) => {
      clearMainPane("Wodex could not load the thread list.");
      setStatus(error.message || "Initialization failed.", true);
    });
  </script>
</body>
</html>
